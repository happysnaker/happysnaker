name: CI

on:
  push:
    branches:
      - master
  pull_request:
  schedule:
    # Weekly drift check for remote support routes and repository metadata.
    - cron: '17 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-public-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout public Pages site
        uses: actions/checkout@v4
        with:
          repository: happysnaker/happysnaker.github.io
          path: site/happysnaker.github.io

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile verification scripts
        run: python3 -m py_compile scripts/verify_public_docs.py scripts/check_support_routes.py scripts/check_repo_metadata.py scripts/check_sponsor_release.py scripts/check_external_followups.py scripts/check_profile_pins.py scripts/check_rdleader_license.py scripts/check_manual_blockers.py scripts/run_profile_preflight.py scripts/check_readme_badges.py scripts/check_github_status.py scripts/check_public_links.py scripts/check_site_hygiene.py scripts/check_share_kit.py

      - name: Verify public docs
        run: python3 scripts/verify_public_docs.py

      - name: Verify share kit
        run: python3 scripts/check_share_kit.py

      - name: Verify README badges
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/check_readme_badges.py

      - name: Verify support routes
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/check_support_routes.py

      - name: Verify repository metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/check_repo_metadata.py

      - name: Verify sponsor release
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/check_sponsor_release.py

      - name: Report profile pins
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/check_profile_pins.py

      - name: Report RDLeader license posture
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/check_rdleader_license.py

      - name: Report manual blockers
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/check_manual_blockers.py

      - name: Verify public site hygiene
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/check_site_hygiene.py --site-root site/happysnaker.github.io --timeout 8
